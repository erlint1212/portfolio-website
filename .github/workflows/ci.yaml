name: CI — Build & Push docker image + kerbenetes config

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  IMAGE: ghcr.io/erlint1212/portfolio-website

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'
      - run: go test ./...

  build-and-push:
    needs: test
    if: github.event_name == 'push'    # Only on merge/push to main
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

     # - name: Build & push image
     #   run: |
     #     TAG=$(git rev-parse --short HEAD)
     #     docker build -t $IMAGE:$TAG -t $IMAGE:latest .
     #     docker push $IMAGE:$TAG
     #     docker push $IMAGE:latest

      - name: Update deployment manifest
        run: |
          TAG=$(git rev-parse --short HEAD)
          sed -i "s|image: ghcr.io/erlint1212/portfolio-website:.*|image: ghcr.io/erlint1212/portfolio-website:$TAG|" kubernetes/portfolio-deployment.yaml

      - name: Commit updated manifest
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add kubernetes/portfolio-deployment.yaml
          git diff --staged --quiet || git commit -m "ci: update image to $(git rev-parse --short HEAD)"
          git push
